# Production stack — zero-downtime-friendly layout.
# Migrations run via one-shot `migrate` service / infra/scripts/migrate.sh — NOT on api boot.

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  # One-shot migrate job — run before rolling API replicas.
  migrate:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
      target: production
    env_file:
      - .env
    environment:
      DEBUG: "false"
      POSTGRES_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py validate_production --strict &&
             python manage.py migrate --noinput"
    restart: "no"
    profiles:
      - migrate

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
      target: production
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DEBUG: "false"
      POSTGRES_HOST: postgres
      APP_RELEASE: ${APP_RELEASE:-local}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # No migrate here — keeps multi-replica boots safe.
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application
             --bind 0.0.0.0:8000
             --workers ${GUNICORN_WORKERS:-4}
             --timeout 120
             --graceful-timeout 30
             --keep-alive 5"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/readyz', timeout=3)",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  worker:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
      target: production
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      APP_RELEASE: ${APP_RELEASE:-local}
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config.celery worker -l warning --concurrency 4

  beat:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
      target: production
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A config.celery beat -l warning

  flower:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
      target: production
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      FLOWER_BASIC_AUTH: ${FLOWER_BASIC_AUTH:-admin:changeme}
    depends_on:
      - redis
      - worker
    ports:
      - "5555:5555"
    command: >
      celery -A config.celery flower
      --port=5555
      --basic_auth=${FLOWER_BASIC_AUTH:-admin:changeme}
    profiles:
      - ops

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
      target: production
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      API_INTERNAL_URL: http://api:8000/api/v1
      APP_RELEASE: ${APP_RELEASE:-local}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 45s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy

volumes:
  postgres_data:
