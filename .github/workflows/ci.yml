name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  api:
    name: API Lint & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: toolverse_test
          POSTGRES_USER: toolverse
          POSTGRES_PASSWORD: toolverse
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U toolverse -d toolverse_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    defaults:
      run:
        working-directory: apps/api
    env:
      SECRET_KEY: ci-secret-key-not-for-production
      DEBUG: "true"
      POSTGRES_DB: toolverse_test
      POSTGRES_USER: toolverse
      POSTGRES_PASSWORD: toolverse
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      ALLOWED_HOSTS: localhost,127.0.0.1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/api/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-django
      - name: Ruff
        run: ruff check .
      - name: Migrate
        run: python manage.py migrate --noinput
      - name: Sync tools
        run: python manage.py sync_tools
      - name: Tests
        run: pytest -q
      - name: Dependency audit (pip)
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt || true

  security:
    name: Dependency vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: pip-audit
        continue-on-error: true
        working-directory: apps/api
        run: |
          python -m pip install --upgrade pip pip-audit
          pip-audit -r requirements.txt
      - name: npm audit
        continue-on-error: true
        run: npm audit --omit=dev --audit-level=high

  web:
    name: Web Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install
        run: npm install
        working-directory: .
      - name: Generate tools registry
        run: npm run generate:tools
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_SITE_NAME: ToolVerse AI
